[pytest]
minversion = 9.0
testpaths = tests
norecursedirs = mlkit Pipfile Pipfile.lock .gitignore LICENSE
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers --strict-config -p no:warnings

markers =
    slow: marks tests as slow running
    integration: marks integrations tests
    parametrize: parameters tests

filterwarnings =
    ignore: UserWarning